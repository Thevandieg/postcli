name: Feature request
description: Suggest an idea for postx.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea. Please describe the problem and the proposed solution.

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What user need or pain point does this solve?
      placeholder: "I want to ..., but ..."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe behavior, UX, and any command changes.
      placeholder: "Add a command that ..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you considered.

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Mockups, references, linked issues, etc.

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I checked existing issues and discussions first.
          required: true
