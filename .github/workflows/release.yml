name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binaries and archives
        run: |
          ./scripts/build-release-assets.sh

      - name: Upload GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/postx-linux-amd64.tar.gz
            dist/postx-linux-arm64.tar.gz
            dist/postx-darwin-amd64.tar.gz
            dist/postx-darwin-arm64.tar.gz
            dist/postx-windows-amd64.zip
